<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PsicoApp</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d6efd">

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="js/firebase.js"></script>
</head>

<body class="bg-dashboard">
    <div id="navbar"></div>

    <div class="container mt-4">
        <h2>Início</h2>

        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card text-white bg-primary">
                    <div class="card-body">
                        <h5 class="card-title">Total de Pacientes</h5>
                        <h2 id="totalPacientes">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-white bg-success">
                    <div class="card-body">
                        <h5 class="card-title">Total de Agendamentos</h5>
                        <h2 id="totalAgendas">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-white bg-warning">
                    <div class="card-body">
                        <h5 class="card-title">Total de Sessões</h5>
                        <h2 id="totalSessoes">0</h2>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-4 col-12 mb-3">
                <div class="card p-3">
                    <h5>Pacientes</h5>
                    <a href="pages/pacientes.html" class="btn btn-primary">Abrir</a>
                </div>
            </div>
            <div class="col-md-4 col-12 mb-3">
                <div class="card p-3">
                    <h5>Agenda</h5>
                    <a href="pages/agenda.html" class="btn btn-success">Abrir</a>
                </div>
            </div>
            <div class="col-md-4 col-12 mb-3">
                <div class="card p-3">
                    <h5>Sessões</h5>
                    <a href="pages/sessoes.html" class="btn btn-warning">Abrir</a>
                </div>
            </div>
        </div>

        <!-- Pacientes recentes -->
        <div class="row mt-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h5>Pacientes Recentes</h5>
                    </div>
                    <div class="card-body">
                        <ul id="pacientesRecentes" class="list-group"></ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/navbar.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/pwa-register.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
</body>

</html>
