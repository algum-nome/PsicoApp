<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sessões</title>
    <link rel="stylesheet" href="../css/style.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

    <script src="../js/firebase.js"></script>

</head>

<body class="bg-sessoes">

    <div id="navbar"></div>

    <div class="container mt-4">

        <h2>Sessões</h2>

        <div class="card p-3 mb-3">

            <textarea id="descricao" class="form-control mb-2"></textarea>

            <button onclick="gravarAudio()" class="btn btn-secondary">
                Gravar áudio
            </button>

            <br><br>

            <audio id="player" controls></audio>

            <button onclick="salvarSessao()" class="btn btn-warning mt-2">Salvar sessão</button>

        </div>

        <ul id="listaSessoes" class="list-group"></ul>

    </div>

    <script src="../js/navbar.js"></script>
    <script src="../js/audio.js"></script>
    <script src="../js/sessoes.js"></script>
    <script src="js/pwa-register.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.getElementById("btnGravar").addEventListener("click", iniciarGravacao);

        async function iniciarGravacao() {
          try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        
            console.log("Microfone permitido");
        
            const mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.start();
        
          } catch (erro) {
            console.error("Erro ao acessar microfone:", erro);
            alert("Permita o acesso ao microfone para gravar áudio.");
          }
        }
    </script>

</body>


</html>
