<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda</title>
    <link rel="stylesheet" href="../css/style.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script src="../js/firebase.js"></script>

</head>

<body class="bg-agenda">

    <div id="navbar"></div>

    <div class="container mt-4">

        <h2>Agendamentos</h2>

        <div class="card p-3 mb-3">

            <select id="paciente" class="form-control mb-2"></select>

            <input type="date" id="data" class="form-control mb-2">

            <input type="time" id="hora" class="form-control mb-2">

            <button onclick="salvarAgenda()" class="btn btn-success">Agendar</button>

        </div>

        <ul id="listaAgendas" class="list-group"></ul>

    </div>

    <script src="../js/navbar.js"></script>
    <script src="../js/agenda.js"></script>
    <script src="js/pwa-register.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
