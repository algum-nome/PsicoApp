<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pacientes</title>
    <link rel="stylesheet" href="../css/style.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script src="../js/firebase.js"></script>

</head>

<body class="bg-pacientes">

    <div id="navbar"></div>

    <div class="container mt-4">

        <h2>Cadastro de Pacientes</h2>

        <form id="formPaciente" class="card p-3 mb-3">

            <input class="form-control mb-2" id="nome" placeholder="Nome">

            <input class="form-control mb-2" id="idade" type="number" placeholder="Idade">

            <input class="form-control mb-2" id="responsavel" placeholder="Responsável">

            <input class="form-control mb-2" id="telefone" placeholder="Telefone" oninput="mascaraTelefone(this)"
                required>

            <input class="form-control mb-2" type="email" id="email" placeholder="Email" required>

            <textarea class="form-control mb-2" id="obs"></textarea>

            <button class="btn btn-primary">Salvar</button>

        </form>

        <h4>Pacientes cadastrados</h4>

        <ul id="listaPacientes" class="list-group"></ul>

    </div>

    <script src="../js/navbar.js"></script>
    <script src="../js/pacientes.js"></script>
    <script src="js/pwa-register.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
